services:
  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    environment:
      TCM_ENV: local
      TCM_DB_BACKEND: sqlite
      TCM_SQLITE_PATH: data/tcm_assistant.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./knowledge:/app/knowledge:ro
