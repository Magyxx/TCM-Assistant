services:
  app:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: local
      EXTRACTOR_BACKEND: fake
      ENABLE_REAL_LLM: "false"
      SESSION_STORE_BACKEND: sqlite
      SESSION_SQLITE_PATH: /app/artifacts/p10m2/p10m2_sessions.sqlite3
      API_LOG_PATH: /app/artifacts/p10m2/api_events.jsonl
      TCM_API_DB_PATH: /app/artifacts/p10m2/p10m2_legacy.sqlite3
      TCM_SQLITE_PATH: /app/artifacts/p10m2/p10m2_p7.sqlite3
      RAG_MODE: hybrid
      RAG_TOP_K: "5"
      RAG_CHUNKS_PATH: /app/knowledge/processed/chunks.jsonl
      RAG_INDEX_DIR: /app/knowledge/indexes
      REPORT_EXPORT_DIR: /app/artifacts/p10m2/exports
    ports:
      - "${DOCKER_APP_PORT:-8000}:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./knowledge:/app/knowledge
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health?extended=true', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
